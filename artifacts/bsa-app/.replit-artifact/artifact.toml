kind = "web"
previewPath = "/"
title = "Bio-Sovereign AI"
version = "1.0.0"
id = "artifacts/bsa-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25837

[services.development]
run = "pnpm --filter @workspace/bsa-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bsa-app", "run", "build" ]
publicDir = "artifacts/bsa-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25837"
BASE_PATH = "/"
